<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="76x76" href="/icon-76.png">
<link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<title>noteitnow</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
/* ══════════════════════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════════════════════ */
:root {
  --sf: -apple-system,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
  --sidebar-w: 260px;
  --accent: #FF9F0A;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --topbar-h: 52px;
  --radius-card: 6px;
  --radius-pill: 100px;
  --spring: cubic-bezier(0.25,1,0.5,1);
}

[data-theme="dark"] {
  --bg: #000;
  --bg2: #0A0A0A;
  --surface: #1C1C1E;
  --surface2: #2C2C2E;
  --surface3: #3A3A3C;
  --text: #fff;
  --text2: rgba(255,255,255,0.72);
  --text3: rgba(255,255,255,0.38);
  --sep: rgba(255,255,255,0.10);
  --danger: #FF453A;
  --glass: rgba(20,20,22,0.80);
  --glass-border: rgba(255,255,255,0.12);
  --label-bg: rgba(255,255,255,0.07);
  --icon-off: rgba(255,255,255,0.35);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.55);
}
[data-theme="light"] {
  --bg: #F2F2F7;
  --bg2: #E5E5EA;
  --surface: #fff;
  --surface2: #F2F2F7;
  --surface3: #E5E5EA;
  --text: #000;
  --text2: rgba(60,60,67,0.70);
  --text3: rgba(60,60,67,0.35);
  --sep: rgba(60,60,67,0.14);
  --danger: #FF3B30;
  --glass: rgba(242,242,247,0.88);
  --glass-border: rgba(255,255,255,0.7);
  --label-bg: rgba(60,60,67,0.06);
  --icon-off: rgba(60,60,67,0.38);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.10);
}
[data-theme="solarized-dark"] {
  --bg:#002b36;--bg2:#073642;--surface:#073642;--surface2:#0d4555;--surface3:#09424d;
  --text:#eee8d5;--text2:rgba(147,161,161,0.8);--text3:rgba(88,110,117,0.7);
  --sep:rgba(255,255,255,0.08);--danger:#dc322f;
  --glass:rgba(7,54,66,0.88);--glass-border:rgba(255,255,255,0.1);
  --label-bg:rgba(255,255,255,0.05);--icon-off:rgba(147,161,161,0.45);
  --shadow-card:0 2px 12px rgba(0,0,0,0.5);
}
[data-theme="solarized-light"] {
  --bg:#fdf6e3;--bg2:#eee8d5;--surface:#eee8d5;--surface2:#fdf6e3;--surface3:#ddd6c0;
  --text:#073642;--text2:rgba(101,123,131,0.8);--text3:rgba(147,161,161,0.7);
  --sep:rgba(0,0,0,0.1);--danger:#dc322f;
  --glass:rgba(253,246,227,0.88);--glass-border:rgba(255,255,255,0.5);
  --label-bg:rgba(0,0,0,0.05);--icon-off:rgba(101,123,131,0.45);
  --shadow-card:0 2px 8px rgba(0,0,0,0.1);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:var(--sf);
  background:var(--bg);
  color:var(--text);
  display:flex;
  -webkit-font-smoothing:antialiased;
}

/* ══════════════════════════════════════════════════════════
   DESKTOP SIDEBAR
══════════════════════════════════════════════════════════ */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--sep);
  display:flex;flex-direction:column;
  height:100dvh;overflow:hidden;
  position:relative;z-index:20;
}
.sidebar-logo{
  padding:20px 20px 14px;
  display:flex;align-items:center;gap:10px;
}
.sidebar-logo-mark{
  width:32px;height:32px;border-radius:9px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#000;
  letter-spacing:-1px;flex-shrink:0;
}
.sidebar-logo-text{
  font-size:17px;font-weight:700;color:var(--text);
  letter-spacing:-0.4px;
}
.sidebar-logo-text span{font-weight:400;color:var(--text3);font-size:13px;display:block;letter-spacing:0;}

.sidebar-search{
  padding:10px 14px 8px;
}
.search-pill{
  display:flex;align-items:center;gap:7px;
  background:var(--surface2);
  border-radius:12px;padding:8px 12px;
}
.search-pill svg{color:var(--text3);flex-shrink:0;}
.search-pill input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:var(--sf);
  font-size:14px;width:100%;
}
.search-pill input::placeholder{color:var(--text3);}

.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0;}
.sidebar-nav::-webkit-scrollbar{display:none;}

.sidebar-section-label{
  padding:12px 20px 4px;
  font-size:11px;font-weight:600;letter-spacing:0.7px;
  text-transform:uppercase;color:var(--text3);
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 20px;
  border-radius:0;cursor:pointer;
  font-size:15px;color:var(--text2);
  transition:background 0.1s;
  user-select:none;position:relative;
}
.nav-item:hover{background:var(--label-bg);color:var(--text);}
.nav-item.active{color:var(--accent);}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:22px;border-radius:0 3px 3px 0;
  background:var(--accent);
}
.nav-item-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;background:var(--label-bg);
}
.nav-item.active .nav-item-icon{background:color-mix(in srgb, var(--accent) 18%, transparent);}
.nav-item svg.icon{
  width:16px;height:16px;
  stroke:var(--icon-off);fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
  transition:stroke 0.15s;
}
.nav-item.active svg.icon{stroke:var(--accent);}
.nav-badge{
  margin-left:auto;
  font-size:11px;font-weight:600;
  background:var(--label-bg);
  border-radius:8px;padding:1px 7px;
  color:var(--text3);
}
.nav-item.active .nav-badge{color:var(--accent);}

.folder-wrap{display:flex;align-items:center;position:relative;}
.folder-wrap .nav-item{flex:1;min-width:0;}
.folder-del-btn{
  opacity:0;background:none;border:none;
  color:var(--danger);cursor:pointer;
  padding:5px 10px;font-size:13px;
  transition:opacity 0.15s;flex-shrink:0;
}
.folder-wrap:hover .folder-del-btn{opacity:0.5;}
.folder-del-btn:hover{opacity:1!important;}

.add-folder-btn{
  margin:6px 14px 4px;
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:12px;
  background:none;border:1.5px dashed var(--sep);
  color:var(--text3);font-size:13px;
  cursor:pointer;width:calc(100% - 28px);
  font-family:var(--sf);transition:all 0.15s;
}
.add-folder-btn:hover{border-color:var(--accent);color:var(--accent);}

.sidebar-footer{
  padding:6px 0;
}

/* ══════════════════════════════════════════════════════════
   MAIN AREA
══════════════════════════════════════════════════════════ */
.main{
  flex:1;display:flex;flex-direction:column;
  height:100dvh;overflow:hidden;
  min-width:0;
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:10px;
  padding:12px 20px;
  padding-top:max(14px, var(--safe-top));
  background:var(--glass);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  flex-shrink:0;z-index:30;
  min-height:var(--topbar-h);
}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.topbar-view-title{
  font-size:22px;font-weight:700;
  letter-spacing:-0.5px;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar-subtitle{
  font-size:12px;color:var(--text3);font-weight:400;
  letter-spacing:0;
}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

.menu-btn,.icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--label-bg);
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;color:var(--text2);
  transition:opacity 0.1s,background 0.1s;
  flex-shrink:0;
}
.icon-btn:active,.menu-btn:active{opacity:0.6;}
.icon-btn.accent{background:var(--accent);color:#000;}
.icon-btn.accent svg{stroke:#000!important;}

.btn-new{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:100px;
  background:var(--accent);border:none;
  color:#000;font-family:var(--sf);font-size:14px;font-weight:600;
  cursor:pointer;transition:opacity 0.1s,transform 0.1s;
  white-space:nowrap;
}
.btn-new:active{opacity:0.8;transform:scale(0.97);}

/* size toggle */
.size-toggle{display:flex;background:var(--surface2);border-radius:8px;padding:2px;gap:2px;}
.size-btn{
  padding:4px 9px;border-radius:6px;border:none;
  background:none;color:var(--text3);
  cursor:pointer;font-size:11px;font-weight:600;
  font-family:var(--sf);transition:all 0.12s;
}
.size-btn.active{background:var(--surface3);color:var(--text);}

/* ── SEARCH BAR EXPANDED ── */
.search-bar-expanded{
  display:none;align-items:center;gap:8px;flex:1;
}
.search-bar-expanded input{
  flex:1;background:var(--surface2);
  border:none;border-radius:12px;
  padding:9px 14px;color:var(--text);
  font-family:var(--sf);font-size:15px;outline:none;
}
.search-bar-expanded input:focus{box-shadow:0 0 0 2px var(--accent);}
.cancel-btn{
  background:none;border:none;color:var(--accent);
  font-family:var(--sf);font-size:15px;cursor:pointer;
  padding:4px;white-space:nowrap;
}

/* ── TAG FILTER BAR ── */
.tag-filter-bar{
  display:none;
  padding:6px 16px 8px;
  overflow-x:auto;flex-shrink:0;
  gap:6px;align-items:center;
}
.tag-filter-bar::-webkit-scrollbar{display:none;}
.tag-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 14px;border-radius:var(--radius-pill);
  font-size:13px;font-weight:500;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  background:var(--surface2);color:var(--text2);
  transition:all 0.12s;font-family:var(--sf);
  border:1px solid transparent;
}
.tag-chip:active{opacity:0.7;}
.tag-chip.active{
  background:color-mix(in srgb, var(--accent) 20%, transparent);
  color:var(--accent);
  border-color:color-mix(in srgb, var(--accent) 40%, transparent);
  font-weight:600;
}
.tag-chip.all-chip.active{background:var(--accent);color:#000;border-color:transparent;}

/* ── CONTENT AREA ── */
.content{
  flex:1;overflow-y:auto;
  padding:12px 20px 20px;
}
.content::-webkit-scrollbar{display:none;}

/* ══════════════════════════════════════════════════════════
   NOTE CARDS
══════════════════════════════════════════════════════════ */
.notes-grid{
  columns:4 200px;gap:12px;
}
.note-card{
  break-inside:avoid;margin-bottom:12px;
  border-radius:var(--radius-card);
  padding:14px 15px 13px;
  cursor:pointer;
  transition:transform 0.18s var(--spring),opacity 0.1s,box-shadow 0.2s var(--spring);
  position:relative;
  box-shadow:var(--shadow-card);
  max-height:300px;overflow:hidden;
}
.note-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.note-card:active{transform:scale(0.97)!important;opacity:0.85;}
.note-card-title{font-size:15px;font-weight:700;margin-bottom:5px;line-height:1.25;word-break:break-word;letter-spacing:-0.1px;}
.note-card-body{font-size:13px;line-height:1.55;opacity:0.85;word-break:break-word;display:-webkit-box;-webkit-line-clamp:8;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap;}
.note-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:11px;opacity:0.55;}
.note-card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px;}
.note-tag{padding:2px 7px;border-radius:7px;font-size:11px;background:rgba(0,0,0,0.15);}

/* card sizes */
.note-card.compact .note-card-body{-webkit-line-clamp:3;font-size:12px;}
.note-card.compact{padding:10px 12px;}
.note-card.spacious .note-card-body{-webkit-line-clamp:12;font-size:14px;}
.note-card.spacious .note-card-title{font-size:18px;}
.note-card.spacious{padding:18px 20px 16px;}
.notes-grid.compact{columns:5 170px;gap:10px;}
.notes-grid.spacious{columns:3 260px;gap:16px;}
.notes-grid.default{columns:4 200px;gap:12px;}

/* pin indicator */
.pin-dot{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#ff6b6b,#c0392b);
  box-shadow:0 2px 6px rgba(0,0,0,0.4);
}

/* ══════════════════════════════════════════════════════════
   VIEW: HOME  (großes Begrüßungs-Header + Ordner + Alle)
══════════════════════════════════════════════════════════ */
.home-hero{
  padding:4px 0 18px;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.home-greeting-time{font-size:13px;color:var(--text3);margin-bottom:2px;}
.home-greeting-name{font-size:32px;font-weight:800;letter-spacing:-0.8px;line-height:1.1;}
.home-section-title{
  font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.5px;
  color:var(--text3);
  margin-bottom:10px;
}
.home-folders-row{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:10px;margin-bottom:28px;
}
.folder-card{
  background:var(--surface);
  border-radius:var(--radius-card);
  padding:16px 12px 12px;
  cursor:pointer;text-align:center;
  transition:all 0.15s var(--spring);
  position:relative;overflow:hidden;
}
.folder-card::before{content:'';position:absolute;inset:0;background:color-mix(in srgb, var(--accent) 0%, transparent);transition:background 0.2s;}
.folder-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.folder-card:hover::before{background:color-mix(in srgb, var(--accent) 6%, transparent);}
.folder-card:active{transform:scale(0.96);}
.folder-card-emoji{font-size:28px;display:block;margin-bottom:6px;}
.folder-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.folder-card-count{font-size:11px;color:var(--text3);}

/* ══════════════════════════════════════════════════════════
   VIEW: ALLE NOTIZEN  (einfaches Grid, alle)
══════════════════════════════════════════════════════════ */
/* same as notes-grid */

/* ══════════════════════════════════════════════════════════
   VIEW: SCHNELLNOTIZEN
══════════════════════════════════════════════════════════ */
.quick-hero{
  background:var(--surface);
  border-radius:var(--radius-card);
  padding:18px 20px;
  margin-bottom:16px;
  display:flex;align-items:center;gap:14px;
}
.quick-hero-icon{
  width:44px;height:44px;border-radius:12px;
  background:color-mix(in srgb, var(--accent) 18%, transparent);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  font-size:20px;
}
.quick-hero-text h2{font-size:17px;font-weight:700;margin-bottom:3px;}
.quick-hero-text p{font-size:13px;color:var(--text3);}

/* ══════════════════════════════════════════════════════════
   VIEW: SUCHEN
══════════════════════════════════════════════════════════ */
.search-hero{
  padding:12px 0 16px;
}
.search-hero h2{font-size:22px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px;}
.recent-search-section{margin-bottom:16px;}
.recent-search-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;cursor:pointer;border-radius:12px;
  font-size:15px;color:var(--text2);transition:background 0.1s;
}
.recent-search-item:active{background:var(--label-bg);}
.recent-search-item .rm{margin-left:auto;opacity:0.3;cursor:pointer;padding:4px;font-size:13px;}
.recent-search-item .rm:active{opacity:0.8;}
.search-results-info{
  font-size:12px;color:var(--text3);
  padding:4px 0 10px;
}

/* ══════════════════════════════════════════════════════════
   VIEW: TAGS
══════════════════════════════════════════════════════════ */
.tags-overview{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;margin-bottom:20px;
}
.tag-overview-card{
  background:var(--surface);
  border-radius:var(--radius-card);
  padding:14px 16px;
  cursor:pointer;
  transition:all 0.15s var(--spring);
  display:flex;flex-direction:column;gap:4px;
}
.tag-overview-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.tag-overview-card:active{transform:scale(0.97);}
.tag-overview-card.active{
  border-color:var(--accent);
  background:color-mix(in srgb, var(--accent) 10%, transparent);
}
.tag-overview-name{font-size:15px;font-weight:600;color:var(--accent);}
.tag-overview-count{font-size:12px;color:var(--text3);}

/* ══════════════════════════════════════════════════════════
   VIEW: ORDNER
══════════════════════════════════════════════════════════ */
.folder-detail-header{
  display:flex;align-items:center;gap:14px;
  padding:16px 0 20px;
}
.folder-detail-emoji{
  width:54px;height:54px;border-radius:var(--radius-card);
  background:color-mix(in srgb, var(--accent) 15%, transparent);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
}
.folder-detail-info h2{font-size:22px;font-weight:800;letter-spacing:-0.4px;}
.folder-detail-info p{font-size:13px;color:var(--text3);}

/* ══════════════════════════════════════════════════════════
   VIEW: TIMELINE
══════════════════════════════════════════════════════════ */
.timeline-group-header{
  font-size:12px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.5px;
  padding:14px 0 8px;
}
.timeline-group-header:first-child{padding-top:4px;}

/* ══════════════════════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════════════════════ */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 20px;text-align:center;color:var(--text3);
  gap:12px;
}
.empty-icon{
  width:64px;height:64px;border-radius:20px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:4px;
}
.empty-state h3{font-size:18px;font-weight:700;color:var(--text2);}
.empty-state p{font-size:14px;color:var(--text3);}

/* ══════════════════════════════════════════════════════════
   MOBILE NAV
══════════════════════════════════════════════════════════ */
.dock-wrap{
  display:none;
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  gap:8px;align-items:center;z-index:100;
}
.mobile-nav{
  display:flex;
  height:60px;padding:0 6px;
  background:color-mix(in srgb, var(--surface), transparent 45%);
  border-radius:30px;
  border:1px solid var(--glass-border);
  box-shadow:0 8px 32px rgba(0,0,0,0.12);
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);
  flex-direction:row;
  align-items:center;justify-content:space-around;
  gap:2px;
}
.mobile-nav-item{
  display:flex;flex-direction:column;align-items:center;
  gap:1px;cursor:pointer;
  padding:4px 0;border:none;background:none;
  min-width:40px;position:relative;height:100%;
  justify-content:center;
  transition:transform 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.mobile-nav-item:active{transform:scale(0.88);}
.mobile-nav-icon-wrap{
  width:36px;height:28px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s cubic-bezier(0.25,1,0.5,1);
}
.mobile-nav-item.active .mobile-nav-icon-wrap{
  background:color-mix(in srgb, var(--accent) 22%, transparent);
}
.mobile-nav-item svg{
  width:22px;height:22px;fill:none;
  stroke:var(--icon-off);stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;
  transition:stroke 0.2s,transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275);
}
.mobile-nav-item.active svg{
  stroke:var(--accent);
  transform:translateY(-1px) scale(1.08);
}
.mobile-nav-label{
  font-size:9px;color:var(--text3);
  letter-spacing:0.1px;font-weight:500;
  line-height:1;transition:color 0.2s;
}
.mobile-nav-item.active .mobile-nav-label{color:var(--accent);font-weight:600;}

.quick-add{
  width:60px;height:60px;border-radius:30px;flex-shrink:0;
  background:color-mix(in srgb, var(--surface), transparent 45%);
  border:1px solid var(--glass-border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);
  box-shadow:0 8px 32px rgba(0,0,0,0.12);
  transition:transform 0.12s,background 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.quick-add:active{transform:scale(0.9);}
.quick-add svg{width:24px;height:24px;stroke:var(--accent);stroke-width:2.5;stroke-linecap:round;fill:none;transition:transform 0.2s;}
.quick-add:active svg{transform:scale(0.85);}

/* ══════════════════════════════════════════════════════════
   NOTE EDITOR OVERLAY
══════════════════════════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);
  z-index:200;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.overlay.open{display:flex;}

.note-modal{
  background:var(--surface);border-radius:0;
  width:100vw;max-width:100vw;height:100dvh;max-height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.note-modal-header{
  display:flex;align-items:center;gap:10px;
  padding:max(14px, var(--safe-top)) 18px 14px;flex-shrink:0;
  background:var(--glass);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  position:sticky;top:0;z-index:2;
}
.color-dot{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  cursor:pointer;box-shadow:0 0 0 2px rgba(255,255,255,0.18);
  transition:transform 0.15s;
}
.color-dot:active{transform:scale(1.15);}
.color-picker-wrap{position:relative;}
.color-options{
  display:none;position:absolute;top:30px;left:0;
  background:var(--surface2);border:1px solid var(--sep);
  border-radius:16px;padding:10px;
  display:none;flex-wrap:wrap;gap:6px;
  width:200px;z-index:10;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.color-options.open{display:flex;}
.color-opt{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:transform 0.12s,border-color 0.12s;
}
.color-opt:hover{transform:scale(1.15);}
.color-opt.sel{border-color:var(--text);}

.note-size-toggle{display:flex;gap:3px;background:var(--surface2);border-radius:8px;padding:2px;}
.note-size-btn{
  width:24px;height:24px;border-radius:6px;border:none;
  background:none;color:var(--text3);cursor:pointer;
  font-size:10px;font-weight:700;font-family:var(--sf);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.12s;
}
.note-size-btn:hover{color:var(--text);}
.note-size-btn.active{background:var(--surface3);color:var(--text);}

.note-modal-title{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--sf);
  font-size:18px;font-weight:700;
  letter-spacing:-0.3px;
  min-width:0;
}
.note-modal-title::placeholder{color:var(--text3);}
.note-modal-close{
  width:30px;height:30px;border-radius:50%;
  background:var(--surface2);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);flex-shrink:0;
  transition:opacity 0.1s;
}
.note-modal-close:active{opacity:0.6;}

.note-modal-body{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.note-format-bar{
  display:flex;align-items:center;gap:2px;
  padding:8px 14px;flex-shrink:0;
  background:color-mix(in srgb, var(--bg), transparent 60%);
  border-bottom:1px solid var(--glass-border);
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.note-format-bar::-webkit-scrollbar{display:none;}
.fmt-btn{
  width:30px;height:30px;border-radius:7px;border:none;
  background:none;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.1s;
}
.fmt-btn:hover{background:var(--label-bg);color:var(--text);}
.fmt-btn:active{background:var(--surface3);}
.fmt-sep{width:1px;height:18px;background:var(--glass-border);margin:0 3px;flex-shrink:0;}
.note-modal-textarea{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--sf);
  font-size:15px;line-height:1.75;resize:none;
  padding:16px 20px;min-height:180px;
  overflow-y:auto;white-space:pre-wrap;word-wrap:break-word;
  max-width:780px;width:100%;margin:0 auto;
}
.note-modal-textarea:empty:before{
  content:attr(data-placeholder);color:var(--text3);pointer-events:none;
}
.note-modal-textarea:focus{outline:none;}
.note-modal-textarea b{font-weight:700;}
.note-modal-textarea i{font-style:italic;}
.note-modal-textarea u{text-decoration:underline;}
.note-modal-textarea s{text-decoration:line-through;}
.note-modal-textarea h2{font-size:18px;font-weight:700;margin:12px 0 4px;letter-spacing:-0.3px;}
.note-modal-textarea ul,.note-modal-textarea ol{padding-left:20px;margin:6px 0;}
.note-modal-textarea li{margin:2px 0;}

.tag-suggestions{
  position:absolute;bottom:0;left:0;right:0;
  display:none;
  background:var(--surface2);
  max-height:160px;overflow-y:auto;z-index:5;
}
.tag-suggestions.show{display:block;}
.tag-suggestion{
  padding:10px 16px;font-size:14px;cursor:pointer;color:var(--text2);
  transition:background 0.1s;
}
.tag-suggestion:hover,.tag-suggestion.highlighted{background:var(--label-bg);color:var(--text);}
.tag-suggestion .match{color:var(--accent);font-weight:600;}

.note-modal-footer{
  padding:12px 18px;flex-shrink:0;
  display:flex;flex-direction:column;gap:10px;
}
.note-modal-footer-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.note-meta{font-size:11px;color:var(--text3);}

.folder-select{
  background:var(--surface2);border:none;outline:none;
  color:var(--text);font-family:var(--sf);
  font-size:13px;border-radius:10px;padding:6px 10px;
  cursor:pointer;
}
.pin-btn{
  display:flex;align-items:center;gap:4px;
  background:var(--label-bg);border:none;border-radius:8px;
  padding:6px 10px;font-size:12px;color:var(--text3);
  cursor:pointer;font-family:var(--sf);transition:all 0.15s;
}
.pin-btn.active{color:var(--accent);}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:14px;border:none;
  cursor:pointer;font-family:var(--sf);font-size:14px;
  font-weight:500;transition:opacity 0.1s,transform 0.1s;
}
.btn:active{opacity:0.7;transform:scale(0.97);}
.btn-ghost{background:var(--label-bg);color:var(--text2);}
.btn-danger{background:rgba(255,59,48,0.10);color:var(--danger);}
.btn-primary{background:var(--accent);color:#000;font-weight:600;}

.tag-input-wrap{
  display:flex;align-items:center;flex-wrap:wrap;gap:5px;
  padding:6px 18px;background:var(--surface2);
}
.tag-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:8px;font-size:12px;
  background:color-mix(in srgb, var(--accent) 18%, transparent);
  color:var(--accent);font-weight:500;
}
.tag-badge .rm{cursor:pointer;opacity:0.6;font-size:11px;}
.tag-badge .rm:hover{opacity:1;}
.tag-input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:var(--sf);
  font-size:13px;flex:1;min-width:80px;
}
.tag-input::placeholder{color:var(--text3);}

.note-editor-tags{
  display:flex;flex-wrap:wrap;gap:5px;
}
.note-editor-tag-chip{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:8px;font-size:12px;font-weight:500;
  cursor:pointer;background:var(--surface2);color:var(--text3);
  transition:all 0.12s;font-family:var(--sf);
}
.note-editor-tag-chip.active{
  background:color-mix(in srgb, var(--accent) 18%, transparent);
  color:var(--accent);
}

/* ══════════════════════════════════════════════════════════
   TIMELINE MODAL
══════════════════════════════════════════════════════════ */
.timeline-bs{
  background:var(--surface);border-radius:24px 24px 0 0;
  width:100%;max-height:75vh;overflow:hidden;
  display:flex;flex-direction:column;
  animation:bsUp 0.35s var(--spring);
  padding-bottom:max(12px, var(--safe-bottom));
}
.timeline-list{overflow-y:auto;flex:1;padding:8px 0;}
.timeline-list::-webkit-scrollbar{display:none;}
.timeline-item{display:flex;gap:14px;padding:10px 20px;}
.timeline-line{display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0;}
.timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.timeline-bar{flex:1;width:2px;background:var(--sep);margin:4px 0;}
.timeline-content{flex:1;min-width:0;padding-bottom:8px;}
.timeline-date{font-size:11px;color:var(--text3);margin-bottom:4px;}
.timeline-text{font-size:13px;line-height:1.55;color:var(--text2);white-space:pre-wrap;word-break:break-word;}

/* ══════════════════════════════════════════════════════════
   BOTTOM SHEET (native iOS style)
══════════════════════════════════════════════════════════ */
.bs-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.45);z-index:400;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.bs-overlay.open{display:flex;}
.bs-sheet{
  background:var(--surface);border-radius:24px 24px 0 0;
  width:100%;max-height:70vh;overflow:hidden;
  display:flex;flex-direction:column;
  animation:bsUp 0.35s var(--spring);
  padding-bottom:max(12px, var(--safe-bottom));
  touch-action:pan-y;
}
@keyframes bsUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.bs-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--surface3);margin:10px auto 6px;flex-shrink:0;
}
.emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.emoji-opt{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;
  background:var(--surface2);transition:all 0.12s;
  border:2px solid transparent;
}
.emoji-opt.sel{border-color:var(--accent);}
.bs-sheet input{
  width:100%;background:var(--surface2);border:none;outline:none;
  color:var(--text);font-family:var(--sf);font-size:15px;
  border-radius:12px;padding:12px 14px;
}
.bs-sheet input::placeholder{color:var(--text3);}

/* ══════════════════════════════════════════════════════════
   CONFIRM BOTTOM SHEET
══════════════════════════════════════════════════════════ */
.confirm-bs{
  background:var(--surface);border-radius:24px 24px 0 0;
  width:100%;overflow:hidden;
  animation:bsUp 0.35s var(--spring);
  padding:6px 20px max(16px, var(--safe-bottom));
  text-align:center;display:flex;flex-direction:column;gap:4px;
}
.confirm-bs h3{font-size:17px;font-weight:700;margin-bottom:4px;}
.confirm-bs p{font-size:14px;color:var(--text2);margin-bottom:12px;line-height:1.5;}
.confirm-bs .btn{
  width:100%;justify-content:center;padding:12px;border-radius:14px;font-size:16px;
}
.confirm-bs .btn-ghost{background:var(--surface2);color:var(--text);font-weight:600;}
.confirm-bs .btn-danger{background:var(--danger);color:#fff;font-weight:700;}
.confirm-bs .btn-primary{background:var(--accent);color:#000;font-weight:700;}

/* ══════════════════════════════════════════════════════════
   SETTINGS MODAL
══════════════════════════════════════════════════════════ */
.settings-group{margin-bottom:24px;}
.settings-group:last-child{margin-bottom:0;}
.settings-group .sheet-item{border-radius:12px;padding:10px 8px;gap:12px;}
.settings-group .sheet-item:active{background:var(--label-bg);}
.settings-group-label{
  font-size:11px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.7px;margin-bottom:12px;
}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.theme-card{
  border-radius:14px;
  padding:12px;cursor:pointer;transition:all 0.15s;
  text-align:center;font-size:13px;font-weight:600;font-family:var(--sf);
  background:var(--surface2);
}
.theme-card:active{opacity:0.7;}
.theme-card.active{border-color:var(--accent);background:color-mix(in srgb, var(--accent) 8%, transparent);}
.theme-card .preview{display:flex;gap:3px;justify-content:center;margin-bottom:8px;}
.theme-card .preview span{width:22px;height:22px;border-radius:6px;border:0.5px solid rgba(255,255,255,0.1);}
.accent-grid{display:flex;flex-wrap:wrap;gap:8px;}
.accent-swatch{
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:all 0.12s;
}
.accent-swatch:active{transform:scale(1.15);}
.accent-swatch.active{border-color:var(--text);}
.accent-reset{margin-top:10px;font-size:13px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:var(--sf);}

/* toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.toggle-row-label{font-size:14px;color:var(--text2);}
.toggle-switch{
  position:relative;width:44px;height:26px;
  background:var(--surface3);border-radius:13px;
  cursor:pointer;transition:background 0.2s;flex-shrink:0;
}
.toggle-switch.active{background:var(--accent);}
.toggle-switch::after{
  content:'';position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;
  background:white;box-shadow:0 1px 4px rgba(0,0,0,0.25);
  transition:transform 0.2s var(--spring);
}
.toggle-switch.active::after{transform:translateX(18px);}

.sheet-item{
  display:flex;align-items:center;gap:14px;
  cursor:pointer;font-size:15px;color:var(--text);
  transition:background 0.1s;font-family:var(--sf);
}
.sheet-item-icon{
  width:32px;height:32px;border-radius:9px;
  background:var(--label-bg);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sheet-item svg{width:16px;height:16px;opacity:0.6;}

/* ══════════════════════════════════════════════════════════
   SIDEBAR OVERLAY (mobile)
══════════════════════════════════════════════════════════ */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:19;backdrop-filter:blur(4px);}
.sidebar-overlay.open{display:block;}

/* ══════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════ */
.toast-container{position:fixed;top:max(60px,calc(var(--safe-top)+8px));left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;display:flex;flex-direction:column;gap:6px;align-items:center;}
.toast{
  background:var(--surface3);color:var(--text);
  border-radius:20px;padding:9px 18px;
  font-family:var(--sf);font-size:13px;font-weight:500;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  animation:toastIn 0.25s var(--spring);
  border:1px solid var(--sep);
  white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)scale(0.95)}to{opacity:1;transform:translateY(0)scale(1)}}

/* ══════════════════════════════════════════════════════════
   SPLASH
══════════════════════════════════════════════════════════ */
#splashScreen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  z-index:9999;transition:opacity 0.5s;
}
#splashScreen.hide{opacity:0;pointer-events:none;}
.splash-icon{
  width:72px;height:72px;border-radius:18px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:900;color:#000;letter-spacing:-2px;
  box-shadow:0 8px 32px color-mix(in srgb, var(--accent) 50%, rgba(0,0,0,0.4));
}
.splash-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.splash-spinner{
  width:24px;height:24px;border:2.5px solid var(--surface3);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.8s linear infinite;margin-top:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}

mark{background:color-mix(in srgb, var(--accent) 30%, transparent);color:inherit;border-radius:3px;padding:0 2px;}

/* ══════════════════════════════════════════════════════════
   DRAG & DROP
══════════════════════════════════════════════════════════ */
.note-card.dragging{opacity:0.35;transform:scale(0.95)!important;}
.note-card.drag-over{outline:2.5px dashed var(--accent);outline-offset:-4px;transform:scale(1.03)!important;}

/* ══════════════════════════════════════════════════════════
   TAG OVERLAY (iOS-style)
══════════════════════════════════════════════════════════ */
.tag-overlay-modal{
  background:var(--surface);border-radius:24px;
  width:min(92vw,420px);max-height:82vh;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
  border:1px solid var(--glass-border);overflow:hidden;
  display:flex;flex-direction:column;
}
.tag-overlay-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;border-bottom:1px solid var(--sep);flex-shrink:0;
}
.tag-overlay-search{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--surface2);border-radius:12px;padding:8px 12px;
}
.tag-overlay-search svg{color:var(--text3);flex-shrink:0;width:16px;height:16px;}
.tag-overlay-search input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--sf);font-size:15px;
}
.tag-overlay-search input::placeholder{color:var(--text3);}
.tag-overlay-body{
  flex:1;overflow-y:auto;padding:8px 12px;
}
.tag-overlay-body::-webkit-scrollbar{display:none;}
.tag-overlay-tile{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-radius:12px;cursor:pointer;
  transition:background 0.1s;margin-bottom:2px;
}
.tag-overlay-tile:active{background:var(--label-bg);}
.tag-overlay-tile-name{font-size:15px;font-weight:500;color:var(--text);}
.tag-overlay-tile-count{font-size:13px;color:var(--text3);background:var(--label-bg);border-radius:8px;padding:2px 9px;}
.tag-overlay-footer{
  display:flex;gap:8px;padding:12px 18px;
  border-top:1px solid var(--sep);flex-shrink:0;
}
.tag-overlay-footer button{
  flex:1;padding:10px;border-radius:12px;border:none;
  font-family:var(--sf);font-size:14px;font-weight:600;cursor:pointer;
  transition:opacity 0.1s;
}
.tag-overlay-footer button:active{opacity:0.7;}
.tag-overlay-footer .btn-show-all{background:var(--accent);color:#000;}
.tag-overlay-footer .btn-all-tags{background:var(--label-bg);color:var(--text2);}
.tag-empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;text-align:center;color:var(--text3);gap:8px;
}
.tag-empty-state svg{width:40px;height:40px;opacity:0.4;}

/* ══════════════════════════════════════════════════════════
   MOBILE RESPONSIVE
══════════════════════════════════════════════════════════ */
@media(max-width:768px){
  .sidebar{display:none;position:fixed;top:0;left:0;bottom:0;z-index:500;transform:translateX(-100%);transition:transform 0.3s var(--spring);}
  .sidebar.mobile-open{display:flex;transform:translateX(0);}
  .main{width:100vw;}
  .topbar{padding:6px 12px;padding-top:max(6px, var(--safe-top));min-height:48px;}
  .topbar-view-title{font-size:20px;}
  .btn-new,.size-toggle{display:none;}
  .content{
    padding:8px 12px 12px;
    padding-bottom:calc(60px + 48px);
  }
  .notes-grid{columns:2 140px;gap:8px;}
  .notes-grid.compact{columns:2 120px;gap:6px;}
  .notes-grid.spacious{columns:1;gap:10px;}
  .note-card{margin-bottom:8px;padding:12px 13px 11px;border-radius:var(--radius-card);}
  .note-card:hover{transform:none!important;}
  .note-card-title{font-size:15px;}
  .note-card-body{font-size:12px;-webkit-line-clamp:5;}
  .note-card-footer{font-size:10px;}
  .note-card-tags{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .note-card-tags::-webkit-scrollbar{display:none;}
  .dock-wrap{display:flex;}
  .menu-btn{display:none;}
  .note-modal-header{padding:max(14px, var(--safe-top)) 12px 10px;}
  .note-modal-textarea{padding:16px 16px;font-size:16px;}
  .home-folders-row{grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:8px;margin-bottom:16px;}
  .folder-card{padding:12px 10px 10px;border-radius:var(--radius-card);}
  .folder-card-emoji{font-size:22px;margin-bottom:6px;}
  .tags-overview{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
  .tag-filter-bar{padding:6px 12px;}
  .home-hero{padding:0 0 14px;}
  .home-greeting-name{font-size:26px;}
}

@media(min-width:769px){
  .dock-wrap,.menu-btn.mobile-only{display:none!important;}
  .content{padding-bottom:20px;}
}

.notes-grid, .content {

  scrollbar-color:var(--surface3) transparent;
}

async function syncToFirestore(){
  try{
    await db.collection('app_data').doc('main').set({notes:state.notes,folders:state.folders,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  }catch(e){console.error('Firestore sync error:',e);}

async function syncFromFirestore(){
  const btn=document.getElementById('syncBtn');
  if(btn)btn.style.opacity='0.5';
  try{
    const doc=await db.collection('app_data').doc('main').get();
    if(doc.exists){
      const data=doc.data();
      const localNotes=JSON.stringify(state.notes);
      const remoteNotes=JSON.stringify(data.notes||[]);
      const hasDiff=localNotes!==remoteNotes||JSON.stringify(state.folders)!==JSON.stringify(data.folders||[]);
      if(hasDiff&&state.notes.length>0){
        await new Promise(resolve=>{
          showConfirm('Datenkonflikt','Cloud-Version übernehmen?',()=>{
            state.notes=data.notes||[];state.folders=data.folders||[];
            save();render();toast('Cloud-Daten geladen');resolve();
          },null,'Cloud verwenden');
        });
      }else{
        if(data.notes)state.notes=data.notes;
        if(data.folders)state.folders=data.folders;
        save();render();toast('Synchronisiert');
      }
    }else{
      await db.collection('app_data').doc('main').set({notes:state.notes,folders:state.folders,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});

  }catch(e){if(!state.offlineMode)toast('Sync fehlgeschlagen');}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function randColor(){return NOTE_COLORS[Math.floor(Math.random()*NOTE_COLORS.length)];}
function isLight(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(r*299+g*587+b*114)/1000>140;
}
function escHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function highlight(text,q){
  if(!q)return escHtml(text);
  const esc=escHtml(text);
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return esc.replace(re,m=>`<mark>${m}</mark>`);
}
function extractHashtags(text){
  const m=text.match(/#[\w\u00c0-\u024f]+/gi)||[];
  return[...new Set(m.map(t=>t.toLowerCase()))];
}
function stripHtml(s){
  if(!s)return'';
  const d=document.createElement('div');d.innerHTML=s;
  return d.textContent||d.innerText||'';
}
function allTags(){
  const s=new Set();
  state.notes.forEach(n=>(n.tags||[]).forEach(t=>s.add(t)));
  return[...s].sort();
}
function fmt(ts){
  const d=new Date(ts),now=new Date(),diff=(now-d)/1000;
  if(diff<60)return'Gerade eben';
  if(diff<3600)return`vor ${Math.floor(diff/60)} Min.`;
  if(diff<86400)return`vor ${Math.floor(diff/3600)} Std.`;
  if(diff<604800)return`vor ${Math.floor(diff/86400)} Tagen`;
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtFull(ts){return new Date(ts).toLocaleString('de-DE',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${r}, ${g}, ${b})`;}

/* ═══════════════════════════════════════════════════════════
   FILTER HELPERS
═══════════════════════════════════════════════════════════ */
function getFilteredNotes(){
  let notes=[...state.notes];
  // pinned first
  notes.sort((a,b)=>{
    if(a.pinned&&!b.pinned)return-1;
    if(!a.pinned&&b.pinned)return 1;
    if(a.position!=null&&b.position!=null)return a.position-b.position;
    return b.updatedAt-a.updatedAt;
  });
  if(state.currentView==='folder'){
    notes=notes.filter(n=>n.folderId===state.activeFolder);
  }else if(state.currentView==='quick'){
    notes=notes.filter(n=>(n.tags||[]).includes(QUICK_TAG));
  }else if(state.currentView==='tags'&&state.activeTagFilter){
    notes=notes.filter(n=>(n.tags||[]).includes(state.activeTagFilter));
  }
  if(state.activeTags.length>0){
    notes=notes.filter(n=>state.activeTags.every(t=>(n.tags||[]).includes(t)));
  }
  if(state.searchQuery){
    const q=state.searchQuery.toLowerCase();
    notes=notes.filter(n=>(n.title||'').toLowerCase().includes(q)||stripHtml(n.body||'').toLowerCase().includes(q)||(n.tags||[]).some(t=>t.includes(q)));
  }
  return notes;
}

/* ═══════════════════════════════════════════════════════════
   NOTE CARD RENDERER
═══════════════════════════════════════════════════════════ */
function makeNoteCard(n){
  const light=isLight(n.color);
  const textColor=light?'#1a1410':'#f0e8df';
  const noteSize=n.size||state.cardSize||'default';
  const card=document.createElement('div');
  card.className='note-card'+(n.pinned?' pinned':'')+' '+noteSize;
  card.style.cssText=`background:${n.color};color:${textColor};`;
  card.innerHTML=`
    ${n.pinned?`<div class="pin-dot"></div>`:''}
    <div class="note-card-title">${highlight(n.title||'Ohne Titel',state.searchQuery)}</div>
    <div class="note-card-body">${highlight(stripHtml(n.body||''),state.searchQuery)}</div>
    ${(n.tags||[]).length?`<div class="note-card-tags">${(n.tags||[]).map(t=>`<span class="note-tag" style="background:rgba(${light?'0,0,0':'255,255,255'},0.15);color:${textColor};">${escHtml(t)}</span>`).join('')}</div>`:''}
    <div class="note-card-footer"><span>${fmt(n.updatedAt)}</span></div>
  `;
  card.dataset.noteId=n.id;
  // drag
  card.draggable=true;
  card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',n.id);card.classList.add('dragging');});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over'));});
  card.addEventListener('dragover',e=>e.preventDefault());
  card.addEventListener('dragenter',()=>card.classList.add('drag-over'));
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault();card.classList.remove('drag-over');
    const draggedId=e.dataTransfer.getData('text/plain');
    if(!draggedId||draggedId===n.id)return;
    const all=[...document.querySelectorAll('.note-card:not(.dragging)')].map(c=>c.dataset.noteId);
    const fi=all.indexOf(draggedId),ti=all.indexOf(n.id);
    if(fi<0||ti<0)return;
    const filtered=getFilteredNotes();
    const noteMap={};filtered.forEach(x=>{noteMap[x.id]=x;});
    const ordered=filtered.filter(x=>x.id!==draggedId);
    ordered.splice(ti,0,noteMap[draggedId]);
    ordered.forEach((x,i)=>{x.position=i;});
    save();render();
  });
  card.onclick=()=>openNote(n.id);
  return card;
}

function renderGrid(container,notes){

    const isActive=state.activeTags.includes(t)||(state.currentView==='tags'&&state.activeTagFilter===t);

}

function renderTimelineView(cont){
  let notes=[...state.notes].sort((a,b)=>b.createdAt-a.createdAt);
  if(state.activeTags.length>0) notes=notes.filter(n=>state.activeTags.every(t=>(n.tags||[]).includes(t)));
  if(state.searchQuery){const q=state.searchQuery.toLowerCase();notes=notes.filter(n=>(n.title||'').toLowerCase().includes(q)||stripHtml(n.body||'').toLowerCase().includes(q));}
  if(notes.length===0){cont.innerHTML=emptyState('📅','Keine Notizen','Deine Timeline erscheint hier.');return;}

  const groups={};
  notes.forEach(n=>{
    const key=new Date(n.createdAt).toLocaleDateString('de-DE',{year:'numeric',month:'long',day:'numeric'});
    if(!groups[key])groups[key]=[];groups[key].push(n);
  });
  cont.innerHTML='';
  Object.entries(groups).forEach(([date,gNotes])=>{
    const header=document.createElement('div');
    header.className='timeline-group-header';header.textContent=date;
    cont.appendChild(header);
    const grid=document.createElement('div');
    renderGrid(grid,gNotes);
    cont.appendChild(grid);
  });
}

function saveCurrentNote(){
  const title=document.getElementById('noteTitle').value.trim();
  const body=document.getElementById('noteBody').innerHTML;
  const folderId=document.getElementById('folderSelect').value;
  if(!title&&!body)return;
  const bodyTags=extractHashtags(stripHtml(body));
  const allTg=[...new Set([...state.editingTags,...bodyTags])];
  if(state.editingNoteId){
    const n=state.notes.find(x=>x.id===state.editingNoteId);
    if(n){
      const changed=n.body!==body||n.title!==title;
      if(changed){n.history=n.history||[];n.history.push({ts:Date.now(),title:n.title,body:n.body});}
      n.title=title;n.body=body;n.color=state.editingColor;
      n.tags=allTg;n.folderId=folderId||null;n.updatedAt=Date.now();
    }
  }else{
    const n={id:uid(),title,body,color:state.editingColor,
      font:'-apple-system,sans-serif',rotation:0,
      tags:allTg,folderId:folderId||null,
      createdAt:Date.now(),updatedAt:Date.now(),
      size:'default',history:[],pinned:false,pinnedAt:null,position:null};
    state.notes.unshift(n);state.editingNoteId=n.id;
  }
  save();
}

let _suggestionIdx=-1;
function getCaretInfo(el){
  const sel=window.getSelection();if(!sel.rangeCount)return{text:'',offset:0};
  const range=sel.getRangeAt(0);const pre=document.createRange();
  pre.selectNodeContents(el);pre.setEnd(range.startContainer,range.startOffset);
  return{text:pre.toString(),offset:range.startOffset,container:range.startContainer};
}
document.getElementById('noteBody').addEventListener('keydown',e=>{
  const sug=document.getElementById('tagSuggestions');
  if(sug.classList.contains('show')){
    const items=sug.querySelectorAll('.tag-suggestion');
    if(e.key==='ArrowDown'){e.preventDefault();_suggestionIdx=Math.min(_suggestionIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('highlighted',i===_suggestionIdx));return;}
    if(e.key==='ArrowUp'){e.preventDefault();_suggestionIdx=Math.max(_suggestionIdx-1,0);items.forEach((el,i)=>el.classList.toggle('highlighted',i===_suggestionIdx));return;}
    if(e.key==='Enter'||e.key==='Tab'){const h=sug.querySelector('.highlighted');if(h){e.preventDefault();applySuggestion(h.dataset.tag);return;}}
    if(e.key==='Escape'){sug.classList.remove('show');sug.innerHTML='';_suggestionIdx=-1;return;}
  }
  if(e.key===' '||e.key==='Enter'){
    sug.classList.remove('show');sug.innerHTML='';_suggestionIdx=-1;
    const ci=getCaretInfo(e.target);const before=ci.text;const match=before.match(/#([\w\u00c0-\u024f]+)$/);
    if(match){
      e.preventDefault();const tag='#'+match[1].toLowerCase();
      const sel=window.getSelection();if(!sel.rangeCount)return;
      const r=sel.getRangeAt(0),node=r.startContainer;
      if(node.nodeType===3){
        const txt=node.textContent||'',pos=r.startOffset,ts=pos-match[0].length;
        node.textContent=txt.substring(0,ts)+txt.substring(pos);sel.collapse(node,ts);
      }
      if(!state.editingTags.includes(tag)){state.editingTags.push(tag);renderTagBadges();renderNoteEditorTags();}
    }
  }
});
document.getElementById('noteBody').addEventListener('input',function(){
  if(state.editingNoteId){clearTimeout(window._autoSave);window._autoSave=setTimeout(saveCurrentNote,800);}
  showTagSuggestions(this);
});
document.getElementById('noteTitle').addEventListener('input',()=>{if(state.editingNoteId){clearTimeout(window._autoSave);window._autoSave=setTimeout(saveCurrentNote,800);}});

function showTagSuggestions(ta){
  const sug=document.getElementById('tagSuggestions');
  const ci=getCaretInfo(ta);const before=ci.text;const match=before.match(/#([\w\u00c0-\u024f]*)$/);
  if(match&&match[1].length>0){
    const query=match[1].toLowerCase();const all=allTags();const filtered=all.filter(t=>t.startsWith('#'+query));
    if(filtered.length>0){
      sug.innerHTML=filtered.slice(0,8).map((t,i)=>`<div class="tag-suggestion${i===0?' highlighted':''}" data-tag="${t}">${highlightMatch(t,query)}</div>`).join('');
      sug.classList.add('show');_suggestionIdx=0;return;
    }
  }
  sug.classList.remove('show');sug.innerHTML='';_suggestionIdx=-1;
}
function applySuggestion(tag){
  const sel=window.getSelection();const node=sel.anchorNode;
  if(node&&node.nodeType===3){
    const txt=node.textContent||'';const pos=sel.anchorOffset;
    const before=txt.substring(0,pos);const match=before.match(/#([\w\u00c0-\u024f]*)$/);
    if(match){node.textContent=txt.substring(0,pos-match[0].length)+txt.substring(pos);sel.collapse(node,pos-match[0].length);}
  }
  if(!state.editingTags.includes(tag)){state.editingTags.push(tag);renderTagBadges();renderNoteEditorTags();}
  document.getElementById('tagSuggestions').classList.remove('show');document.getElementById('tagSuggestions').innerHTML='';_suggestionIdx=-1;
  document.getElementById('noteBody').focus();
}
function highlightMatch(tag,query){
  const idx=tag.toLowerCase().indexOf(query);if(idx===-1)return tag;
  return tag.slice(0,idx)+'<span class="match">'+tag.slice(idx,idx+query.length)+'</span>'+tag.slice(idx+query.length);
}

/* ═══════════════════════════════════════════════════════════
   TIMELINE
═══════════════════════════════════════════════════════════ */
function openTimeline(){
  if(!state.editingNoteId)return;saveCurrentNote();
  const n=state.notes.find(x=>x.id===state.editingNoteId);if(!n)return;
  const list=document.getElementById('timelineList');list.innerHTML='';
  const entries=[{ts:n.updatedAt,title:n.title,body:document.getElementById('noteBody').innerHTML,label:'(aktuell)'},...(n.history||[]).slice().reverse().map(h=>({ts:h.ts,title:h.title,body:h.body,label:''}))];
  entries.forEach((e,i)=>{
    const el=document.createElement('div');el.className='timeline-item';
    el.innerHTML=`<div class="timeline-line"><div class="timeline-dot" style="background:${i===0?'var(--accent)':'var(--text3)'};"></div>${i<entries.length-1?'<div class="timeline-bar"></div>':''}</div><div class="timeline-content"><div class="timeline-date">${fmtFull(e.ts)} ${e.label}</div>${e.title?`<div style="font-size:15px;font-weight:600;margin-bottom:4px;">${escHtml(e.title)}</div>`:''}<div class="timeline-text">${escHtml(stripHtml(e.body||'—'))}</div></div>`;
    list.appendChild(el);
  });
  document.getElementById('timelineOverlay').classList.add('open');
}
function closeTimeline(){document.getElementById('timelineOverlay').classList.remove('open');}

/* ═══════════════════════════════════════════════════════════
   FOLDERS
═══════════════════════════════════════════════════════════ */
let selectedEmoji='📁';
function buildEmojiRow(){
  const row=document.getElementById('emojiRow');row.innerHTML='';
  EMOJIS.forEach(e=>{
    const el=document.createElement('span');el.className='emoji-opt'+(e===selectedEmoji?' sel':'');el.textContent=e;
    el.onclick=()=>{selectedEmoji=e;document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');};
    row.appendChild(el);
  });
}
document.getElementById('addFolderBtn').onclick=()=>{selectedEmoji='📁';buildEmojiRow();document.getElementById('folderNameInput').value='';document.getElementById('folderOverlay').classList.add('open');setTimeout(()=>document.getElementById('folderNameInput').focus(),50);};
function closeFolderModal(){closeFolderSheet();}

/* ── Sheet Swipe-to-Dismiss ── */
let _sheetDrag={startY:0,currentY:0,el:null,cb:null};
function initSheetDrag(el,cb){
  if(!el)return;
  el.addEventListener('touchstart',e=>{_sheetDrag.startY=e.touches[0].clientY;_sheetDrag.currentY=_sheetDrag.startY;_sheetDrag.el=el;_sheetDrag.cb=cb;el.style.transition='none';},{passive:true});
  el.addEventListener('touchmove',e=>{_sheetDrag.currentY=e.touches[0].clientY;const d=_sheetDrag.currentY-_sheetDrag.startY;if(d>0)el.style.transform=`translateY(${d*0.8}px)`;if(d>0)el.style.opacity=1-d/400;},{passive:true});
  el.addEventListener('touchend',e=>{const d=_sheetDrag.currentY-_sheetDrag.startY;if(d>80&&_sheetDrag.cb)_sheetDrag.cb();else resetSheetDrag(el);_sheetDrag={startY:0,currentY:0,el:null,cb:null};},{passive:true});
}
function resetSheetDrag(el){
  el.style.transform='';el.style.opacity='';el.style.transition='transform 0.3s var(--spring), opacity 0.3s var(--spring)';
  setTimeout(()=>{if(el)el.style.transition='';},350);
}

function createFolder(){
  const name=document.getElementById('folderNameInput').value.trim();if(!name)return;
  state.folders.push({id:uid(),name,emoji:selectedEmoji,updatedAt:Date.now()});
  save();closeFolderModal();render();toast(`Ordner „${name}" erstellt`);
}
document.getElementById('folderNameInput').addEventListener('keydown',e=>{if(e.key==='Enter')createFolder();});
function deleteFolder(id){
  showConfirm('Ordner löschen?','Notizen bleiben erhalten, verlieren aber den Ordner.',()=>{
    state.notes.forEach(n=>{if(n.folderId===id)n.folderId=null;});
    state.folders=state.folders.filter(f=>f.id!==id);
    if(state.activeFolder===id){state.currentView='all';state.activeFolder=null;}
    save();render();toast('Ordner gelöscht');
  });
}

/* ═══════════════════════════════════════════════════════════
   CONFIRM
═══════════════════════════════════════════════════════════ */
function showConfirm(title,msg,okCb,altCb,okLabel,altLabel){
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmMsg').textContent=msg;
  state.confirmCallback=okCb;state.confirmAltCallback=altCb||null;
  const okBtn=document.getElementById('confirmOkBtn');const altBtn=document.getElementById('confirmAltBtn');
  okBtn.textContent=okLabel||'OK';
  if(altCb&&altLabel){altBtn.style.display='';altBtn.textContent=altLabel;}else{altBtn.style.display='none';}
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');}
document.getElementById('confirmOkBtn').onclick=()=>{closeConfirm();if(state.confirmCallback)state.confirmCallback();};
document.getElementById('confirmAltBtn').onclick=()=>{closeConfirm();if(state.confirmAltCallback)state.confirmAltCallback();};

/* ═══════════════════════════════════════════════════════════
   SIDEBAR TOGGLE (mobile)
═══════════════════════════════════════════════════════════ */
function toggleSidebar(){
  const s=document.getElementById('sidebar');const o=document.getElementById('sidebarOverlay');
  s.classList.toggle('mobile-open');o.classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

/* ═══════════════════════════════════════════════════════════
   DESKTOP SEARCH
═══════════════════════════════════════════════════════════ */
document.getElementById('desktopSearchInput').addEventListener('input',e=>{
  state.searchQuery=e.target.value.trim();
  if(state.searchQuery){
    state.currentView='search';
    saveRecentSearch(state.searchQuery);
  }
  render();
});
document.getElementById('mobileSearchInput').addEventListener('input',e=>{
  state.searchQuery=e.target.value.trim();
  if(state.searchQuery)saveRecentSearch(state.searchQuery);
  render();
});

/* ═══════════════════════════════════════════════════════════
   EXPORT / IMPORT
═══════════════════════════════════════════════════════════ */
function exportData(){
  const data={notes:state.notes,folders:state.folders,theme:state.theme,accent:state.accent,cardSize:state.cardSize,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`noteitnow_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
  toast('Daten exportiert');
}
function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);if(!data.notes||!Array.isArray(data.notes))throw new Error('Ungültige Datei');
      state.notes=data.notes;state.folders=data.folders||[];
      if(data.theme)state.theme=data.theme;if(data.accent)state.accent=data.accent;if(data.cardSize)state.cardSize=data.cardSize;
      save();applyTheme();render();toast(`${data.notes.length} Notiz(en) importiert`);
    }catch(e){toast('Fehler: Ungültige Datei');}
  };
  reader.readAsText(file);event.target.value='';
}
function clearLocalStorage(){
  showConfirm('LocalStorage leeren?','Alle lokalen Daten werden gelöscht.',()=>{
    localStorage.removeItem('notizzettel_v3');
    state.notes=[];state.folders=[];state.theme='dark';state.accent='#e8935a';state.cardSize='default';state.offlineMode=false;
    document.getElementById('offlineToggle').classList.remove('active');
    render();toast('LocalStorage geleert');
  });
}

/* ═══════════════════════════════════════════════════════════
   START
═══════════════════════════════════════════════════════════ */
async function startApp(){
  buildColorOptions();
  load();applyTheme();
  initSheetDrag(document.getElementById('folderSheetInner'),closeFolderSheet);
  initSheetDrag(document.getElementById('confirmSheetInner'),closeConfirm);
  initSheetDrag(document.getElementById('timelineSheetInner'),closeTimeline);

  const splash=document.getElementById('splashScreen');
  if(state.offlineMode){
    document.getElementById('offlineToggle').classList.add('active');
    document.getElementById('syncBtn').style.display='none';
  }
  render();

  if(state.offlineMode){
    splash.classList.add('hide');setTimeout(()=>splash.style.display='none',600);
  }else{
    try{await syncFromFirestore();render();}catch(e){}
    splash.classList.add('hide');setTimeout(()=>splash.style.display='none',600);
  }

  if('serviceWorker' in navigator){try{await navigator.serviceWorker.register('/sw.js');}catch(e){}}
}

startApp();
</script>
